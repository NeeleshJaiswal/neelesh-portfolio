version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 16
        - nvm use 16
        - npm cache clean --force
        - rm -rf node_modules package-lock.json
        - npm install --legacy-peer-deps --force
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'