version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm --version
        - node --version
        - rm -rf node_modules package-lock.json
        - npm install --registry https://registry.npmjs.org/ --no-audit --no-fund
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'